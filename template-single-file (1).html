const state = {
  screen: 'landing',      // 'landing' | 'quiz' | 'lead' | 'result'
  currentQ: 0,            // index câu hỏi hiện tại
  answers: {},            // { 0: optionIdx, 1: optionIdx, ... }
  scores: {},             // { DH: 0, KN: 0, ... }
  lead: { name: '', phone: '', email: '', consent: false },
  result: null,           // { primary: ARCHETYPE, secondary: ARCHETYPE }
};

/* ============================================================
   SCORING
   ============================================================ */
function calculateScores() {
  const scores = { DH: 0, KN: 0, CP: 0, DD: 0, PT: 0, CLTC: 0, TP: 0, KT: 0 };
  Object.entries(state.answers).forEach(([qIdx, optIdx]) => {
    const chosen = QUESTIONS[qIdx].options[optIdx];
    Object.entries(chosen.scores).forEach(([code, pts]) => {
      scores[code] += pts;
    });
  });
  return scores;
}

function determineResult() {
  const scores = calculateScores();
  state.scores = scores;
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  state.result = {
    primary: ARCHETYPES[sorted[0][0]],
    secondary: ARCHETYPES[sorted[1][0]],
    scoreDistribution: sorted,
  };
}

  app.appendChild(screen);

}

/* --- QUIZ --- */
function renderQuiz() {
  const q = QUESTIONS[state.currentQ];
  const totalQ = QUESTIONS.length;
  const progress = ((state.currentQ) / totalQ) * 100;
  const answered = state.answers[state.currentQ] !== undefined;

  const el = document.createElement('div');
  el.innerHTML = `
    <!-- Progress bar -->
    <div class="mb-6">
      <div class="flex justify-between items-center mb-2 text-sm">
        <span class="text-neutral-500 font-medium">Câu ${state.currentQ + 1} / ${totalQ}</span>
        <span class="text-neutral-400">${Math.round(progress)}% hoàn thành</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width: ${((state.currentQ + (answered ? 1 : 0)) / totalQ) * 100}%"></div>
      </div>
    </div>

    <!-- Question -->
    <h2 class="text-xl sm:text-2xl font-semibold text-neutral-900 mb-6 leading-snug">
      ${q.q}
    </h2>

    <!-- Options -->
    <div id="options-container">
      ${q.options.map((opt, idx) => `
        <button class="option-btn ${state.answers[state.currentQ] === idx ? 'selected' : ''}" data-idx="${idx}">
          <span class="option-letter">${String.fromCharCode(65 + idx)}</span>
          ${opt.text}
        </button>
      `).join('')}
    </div>

    <!-- Nav -->
    <div class="flex justify-between items-center mt-8">
      <button id="prev-btn" class="btn-ghost ${state.currentQ === 0 ? 'invisible' : ''}">
        ← Quay lại
      </button>
      <button id="next-btn" class="btn-primary" ${!answered ? 'disabled' : ''}>
        ${state.currentQ === totalQ - 1 ? 'Xem kết quả' : 'Tiếp theo →'}
      </button>
    </div>
  `;

  // Events
  el.querySelectorAll('.option-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.getAttribute('data-idx'));
      state.answers[state.currentQ] = idx;
      render();
    });
  });

  el.querySelector('#prev-btn').addEventListener('click', () => {
    if (state.currentQ > 0) {
      state.currentQ--;
      render();
    }
  });

  el.querySelector('#next-btn').addEventListener('click', () => {
    if (state.answers[state.currentQ] === undefined) return;
    if (state.currentQ < totalQ - 1) {
      state.currentQ++;
      render();
    } else {
      state.screen = 'lead';
      render();
    }
  });

  return el;
}

/* --- LEAD GATE --- */
function renderLeadGate() {
  const el = document.createElement('div');
  el.innerHTML = `
    <div class="text-center mb-6">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-primary-50 rounded-full mb-4">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#0741DA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

      <div>
        <label class="block text-sm font-medium text-neutral-700 mb-1.5">Email</label>

      </div>
      <label class="flex items-start gap-2 text-sm text-neutral-600 cursor-pointer pt-2">
        <input type="checkbox" id="lead-consent" class="mt-1 accent-primary-500" ${state.lead.consent ? 'checked' : ''}>
        <span>Tôi đồng ý để Citics liên hệ tư vấn về CACN và các cơ hội phù hợp với kết quả của tôi.</span>

      <div id="lead-error" class="text-sm text-red-600 hidden"></div>
      <button type="submit" class="btn-primary w-full mt-4">
        Xem kết quả cá nhân hoá →
      </button>
    </form>

    <p class="text-xs text-neutral-400 text-center mt-4">
      Thông tin của bạn được bảo mật theo <a href="https://citics.vn/phap-ly-chi-tiet/chinh-sach-rieng-tu" class="text-primary-500 hover:underline">chính sách riêng tư</a> của Citics.
    </p>
  `;

  el.querySelector('#lead-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const name = el.querySelector('#lead-name').value.trim();
    const phone = el.querySelector('#lead-phone').value.trim();
    const email = el.querySelector('#lead-email').value.trim();
    const consent = el.querySelector('#lead-consent').checked;
    const errorEl = el.querySelector('#lead-error');

    if (!name || !phone || !email) {
      errorEl.textContent = 'Vui lòng điền đầy đủ thông tin.';
      errorEl.classList.remove('hidden');
      return;
    }
    if (!/^[0-9\s]{9,15}$/.test(phone)) {
      errorEl.textContent = 'Số điện thoại không hợp lệ.';
      errorEl.classList.remove('hidden');
      return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      errorEl.textContent = 'Email không hợp lệ.';
      errorEl.classList.remove('hidden');
      return;
    }
    if (!consent) {
      errorEl.textContent = 'Vui lòng đồng ý điều khoản để tiếp tục.';
      errorEl.classList.remove('hidden');
      return;
    }

    state.lead = { name, phone, email, consent };
    determineResult();

    // Hook để team dev gắn analytics/CRM backend
    trackEvent('quiz_lead_submitted', {
      archetype_primary: state.result.primary.code,
      archetype_secondary: state.result.secondary.code,
      cacn_role: state.result.primary.cacnPrimary,
    });
    saveLead(state.lead, state.result);

    state.screen = 'result';
    render();
  });

  return el;
}
